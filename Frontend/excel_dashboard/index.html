<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidCare | Data Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <img src="../shared_assets/images/logo.svg" alt="Logo" style="width: 100%; height: 100%;">
            </div>
            <span class="logo-text">RapidCare HUB</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-sheet="hospitals" onclick="switchSheet('hospitals', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7M4 17h16V7H4v10z"></path>
                </svg>
                <span>Hospitals</span>
            </div>
            <div class="nav-item" data-sheet="drivers" onclick="switchSheet('drivers', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="10" width="18" height="8" rx="2"></rect>
                    <path d="M19 18h2a1 1 0 0 0 1-1v-4l-3-3h-3"></path>
                    <circle cx="5" cy="18" r="2"></circle>
                    <circle cx="15" cy="18" r="2"></circle>
                </svg>
                <span>Drivers</span>
            </div>
            <div class="nav-item" data-sheet="patients" onclick="switchSheet('patients', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Patients</span>
            </div>
        </nav>
        <div class="sidebar-footer" style="padding: 24px; border-top: 1px solid var(--border-color);">
            <p style="font-size: 0.75rem; color: var(--text-muted);">© 2024 RapidCare Inc.</p>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <header>
            <div class="header-left">
                <h2 id="sheet-title">Hospital Records</h2>
            </div>
            <div class="header-right">
                <div class="search-container">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search records..." oninput="handleSearch()">
                </div>
                <button class="btn-export" onclick="exportToExcel()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export to Excel
                </button>
            </div>
        </header>

        <div class="dashboard-body">
            <div class="table-container">
                <table id="dataTable">
                    <thead id="tableHead">
                        <!-- Headers injected by JS -->
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../shared_assets/js/config.js"></script>
    <script src="mockData.js"></script>
    <script src="script.js"></script>
    <!-- Skeleton Loading Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const boxes = document.querySelectorAll('.stat-card, .card, .profile-panel, .info-card, .metric-card, .driver-profile-card, .vehicle-card, .emergency-details-card, .form-section, .table-container');
            boxes.forEach(box => box.classList.add('skeleton-box'));
            
            setTimeout(() => {
                boxes.forEach(box => box.classList.add('loaded'));
                setTimeout(() => {
                    boxes.forEach(box => box.classList.remove('skeleton-box', 'loaded'));
                }, 600); // Match transition duration
            }, 1500);
        });
    </script>
</body>
</html>
