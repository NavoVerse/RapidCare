<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose User - RapidCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h1 class="page-title">Select Your Role</h1>
        
        <div class="cards-wrapper">
            <!-- Patient Card -->
            <a href="../rapid_Care_Login/index.html" class="role-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2>Patient</h2>
                <p>Connect with local healthcare services instantly.</p>
            </a>

            <!-- Driver Card -->
            <a href="#" class="role-card driver-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        <rect x="2" y="10" width="20" height="10" rx="2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="6" cy="20" r="2" stroke-width="2"/>
                        <circle cx="18" cy="20" r="2" stroke-width="2"/>
                    </svg>
                </div>
                <h2>Driver</h2>
                <p>Manage emergency rides and help people in need.</p>
            </a>

            <!-- Hospital Card -->
            <a href="#" class="role-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                </div>
                <h2>Hospital</h2>
                <p>Administer resources and manage incoming patients.</p>
            </a>
        </div>

        <div class="contact-section">
            <p>Contact us at <a href="mailto:support@rapidcare.com">support@rapidcare.com</a></p>
        </div>
    </div>

</body>
</html>
