<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient History | RapidCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">R</div>
            <span class="logo-text">RapidCare</span>
        </div>

        <nav class="nav-menu">
            <a href="../patient_Dashboard/index.html?view=overview" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Overview</span>
            </a>
            <a href="../patient_Dashboard/index.html?view=details" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span>Details</span>
            </a>
            <a href="../patient_Dashboard/index.html?view=tracking" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span>Tracking</span>
            </a>
            <a href="../patient_Dashboard/index.html?view=insurance" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Insurance</span>
            </a>
            <a href="#" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>History</span>
            </a>
            <a href="../patient_Dashboard/index.html?view=payments" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="5" width="20" height="14" rx="2" />
                    <line x1="2" y1="10" x2="22" y2="10" />
                </svg>
                <span>Payments</span>
            </a>
        </nav>

        <div class="user-profile">
            <img src="../patient_Dashboard/samim_profile.jpg" alt="Samim Uddin" class="user-avatar">
            <div class="user-info">
                <h4 style="font-size: 14px;">Samim Uddin Molla</h4>
                <p style="font-size: 11px;">Patient (Premium)</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div class="header-left">
                <button class="icon-btn" id="sidebar-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="search-bar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="history-search" placeholder="Search records, doctors, or hospitals...">
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="theme-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </div>
                <div class="user-avatar-small">
                    <img src="../patient_Dashboard/samim_profile.jpg" alt="SU" style="width:36px; height:36px; border-radius:50%; border: 2px solid var(--primary-green);">
                </div>
            </div>
        </header>

        <div class="history-container">
            <!-- Timeline Pane -->
            <section class="timeline-pane">
                <div class="pane-header">
                    <h3>Medical Records</h3>
                    <span id="record-count" style="font-size: 12px; color: var(--text-muted);">8 Records</span>
                </div>
                <div class="filters-row">
                    <span class="filter-chip active" data-filter="all">All Visits</span>
                    <span class="filter-chip" data-filter="cardiology">Cardiology</span>
                    <span class="filter-chip" data-filter="general">General</span>
                    <span class="filter-chip" data-filter="lab">Lab Results</span>
                </div>
                <div class="history-list" id="history-list">
                    <!-- History Items will be injected here -->
                </div>
            </section>

            <!-- Detail Pane -->
            <section class="detail-pane" id="detail-pane">
                <div id="no-selection" style="text-align: center; margin-top: 100px; color: var(--text-muted);">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom: 20px;">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <p>Select a medical record to view details</p>
                </div>
                <div id="detail-content" style="display: none;">
                    <!-- Detail content will be injected here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Schedule New Appointment</h3>
                <span class="close-modal" id="close-booking-modal" onclick="closeBookingModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="booking-form" onsubmit="handleBookingSubmit(event)">
                    <div class="form-group">
                        <label>Doctor Name</label>
                        <input type="text" id="book-doctor" placeholder="e.g. Dr. Sarah Mitchell" required>
                    </div>
                    <div class="form-group">
                        <label>Specialty</label>
                        <input type="text" id="book-specialty" placeholder="e.g. Cardiology" required>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="book-date" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="book-time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Hospital/Clinic</label>
                        <input type="text" id="book-hospital" placeholder="e.g. City General Hospital" required>
                    </div>
                    <div class="form-group">
                        <label>Appointment Type</label>
                        <select id="book-type">
                            <option value="Checkup">Regular Checkup</option>
                            <option value="Consultation">Consultation</option>
                            <option value="Follow-up">Follow-up Visit</option>
                            <option value="Diagnostics">Diagnostics/Lab</option>
                        </select>
                    </div>
                    <button type="submit" class="primary-btn" style="width: 100%; margin-top: 20px; justify-content: center;">
                        Confirm Booking
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
